services:
  postgres:
    image: postgres:15-alpine
    container_name: techstore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore123
      POSTGRES_DB: techstore
    ports:
      - '5444:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U techstore']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: techstore-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@techstore.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5052:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mailhog:
    image: mailhog/mailhog:latest
    container_name: techstore-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI

volumes:
  postgres_data:
  pgadmin_data:
