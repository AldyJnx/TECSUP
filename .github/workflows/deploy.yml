name: Deploy Lab 7 - JWT Auth to Render

on:
  push:
    branches:
      - main
    paths:
      - 'Desarrollo Web Avanzado/Lab_7/jwt-auth-app/**'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
